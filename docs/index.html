<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Model Leaderboard</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
		<style>
			:root {
				--bg: #0a0a0a;
				--surface: #111111;
				--border: #222222;
				--accent: #e8ff47;
				--accent2: #ff6b35;
				--text: #f0f0f0;
				--muted: #555555;
				--gold: #ffd700;
				--silver: #c0c0c0;
				--bronze: #cd7f32;
				--green: #39d353;
				--mono: 'Space Mono', monospace;
				--display: 'Syne', sans-serif;
			}
			
			* { margin: 0; padding: 0; box-sizing: border-box; }
			
			body {
				background: var(--bg);
				color: var(--text);
				font-family: var(--mono);
				min-height: 100vh;
				overflow-x: hidden;
			}
			
			/* Noise overlay */
			body::before {
				content: '';
				position: fixed;
				inset: 0;
				background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
				pointer-events: none;
				z-index: 0;
			}
			
			.container {
				max-width: 900px;
				margin: 0 auto;
				padding: 0 24px;
				position: relative;
				z-index: 1;
			}
			
			/* Header */
			header {
				padding: 60px 0 40px;
				border-bottom: 1px solid var(--border);
			}
			
			.header-inner {
				display: flex;
				align-items: flex-end;
				justify-content: space-between;
				gap: 24px;
				flex-wrap: wrap;
			}
			
			.logo-area h1 {
				font-family: var(--display);
				font-size: clamp(2rem, 6vw, 3.5rem);
				font-weight: 800;
				line-height: 1;
				letter-spacing: -0.03em;
				color: var(--text);
			}
			
			.logo-area h1 span {
				color: var(--accent);
			}
			
			.logo-area p {
				margin-top: 10px;
				font-size: 0.75rem;
				color: var(--muted);
				letter-spacing: 0.15em;
				text-transform: uppercase;
			}
			
			.live-badge {
				display: flex;
				align-items: center;
				gap: 8px;
				background: rgba(57, 211, 83, 0.08);
				border: 1px solid rgba(57, 211, 83, 0.25);
				padding: 8px 14px;
				font-size: 0.7rem;
				letter-spacing: 0.1em;
				text-transform: uppercase;
				color: var(--green);
			}
			
			.live-dot {
				width: 6px;
				height: 6px;
				border-radius: 50%;
				background: var(--green);
				animation: pulse 2s ease-in-out infinite;
			}
			
			@keyframes pulse {
				0%, 100% { opacity: 1; transform: scale(1); }
				50% { opacity: 0.4; transform: scale(0.8); }
			}
			
			/* Stats bar */
			.stats-bar {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
				gap: 1px;
				margin: 32px 0;
				background: var(--border);
				border: 1px solid var(--border);
			}
			
			.stat-cell {
				background: var(--surface);
				padding: 20px 24px;
			}
			
			.stat-cell .label {
				font-size: 0.65rem;
				text-transform: uppercase;
				letter-spacing: 0.15em;
				color: var(--muted);
				margin-bottom: 6px;
			}
			
			.stat-cell .value {
				font-family: var(--display);
				font-size: 1.6rem;
				font-weight: 800;
				color: var(--accent);
			}
			
			/* Controls */
			.controls {
				display: flex;
				align-items: center;
				justify-content: space-between;
				margin-bottom: 16px;
				gap: 16px;
				flex-wrap: wrap;
			}
			
			.section-label {
				font-size: 0.65rem;
				text-transform: uppercase;
				letter-spacing: 0.2em;
				color: var(--muted);
			}
			
			.refresh-btn {
				background: none;
				border: 1px solid var(--border);
				color: var(--muted);
				font-family: var(--mono);
				font-size: 0.7rem;
				letter-spacing: 0.1em;
				text-transform: uppercase;
				padding: 7px 14px;
				cursor: pointer;
				transition: all 0.2s;
			}
			
			.refresh-btn:hover {
				border-color: var(--accent);
				color: var(--accent);
			}
			
			/* Table */
			.table-wrap {
				border: 1px solid var(--border);
				overflow: hidden;
			}
			
			table {
				width: 100%;
				border-collapse: collapse;
			}
			
			thead th {
				background: var(--surface);
				padding: 14px 20px;
				text-align: left;
				font-size: 0.65rem;
				letter-spacing: 0.15em;
				text-transform: uppercase;
				color: var(--muted);
				border-bottom: 1px solid var(--border);
				font-weight: 400;
			}
			
			tbody tr {
				border-bottom: 1px solid var(--border);
				transition: background 0.15s;
				animation: fadeIn 0.4s ease both;
			}
			
			tbody tr:last-child { border-bottom: none; }
			
			tbody tr:hover { background: rgba(255,255,255,0.025); }
			
			@keyframes fadeIn {
				from { opacity: 0; transform: translateY(6px); }
				to   { opacity: 1; transform: translateY(0); }
			}
			
			td {
				padding: 16px 20px;
				font-size: 0.8rem;
				vertical-align: middle;
			}
			
			/* Rank column */
			.rank {
				width: 52px;
				text-align: center;
				padding-left: 16px;
			}
			
			.rank-num {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				width: 28px;
				height: 28px;
				font-family: var(--display);
				font-weight: 800;
				font-size: 0.85rem;
			}
			
			.rank-1 .rank-num { color: var(--gold); }
			.rank-2 .rank-num { color: var(--silver); }
			.rank-3 .rank-num { color: var(--bronze); }
			
			/* Accuracy bar */
			.accuracy-cell {
				width: 220px;
			}
			
			.accuracy-wrap {
				display: flex;
				align-items: center;
				gap: 12px;
			}
			
			.accuracy-val {
				font-family: var(--display);
				font-weight: 600;
				font-size: 0.95rem;
				color: var(--text);
				min-width: 54px;
			}
			
			.bar-track {
				flex: 1;
				height: 4px;
				background: var(--border);
				position: relative;
				overflow: hidden;
			}
			
			.bar-fill {
				height: 100%;
				background: var(--accent);
				transform-origin: left;
				animation: growBar 0.8s cubic-bezier(0.16,1,0.3,1) both;
			}
			
			.rank-1 .bar-fill { background: var(--gold); }
			.rank-2 .bar-fill { background: var(--silver); }
			.rank-3 .bar-fill { background: var(--bronze); }
			
			@keyframes growBar {
				from { transform: scaleX(0); }
				to   { transform: scaleX(1); }
			}
			
			/* Commit hash */
			.commit {
				font-size: 0.75rem;
				color: var(--accent);
				background: rgba(232, 255, 71, 0.06);
				border: 1px solid rgba(232, 255, 71, 0.15);
				padding: 3px 8px;
				letter-spacing: 0.05em;
			}
			
			/* Timestamp */
			.ts { color: var(--muted); font-size: 0.72rem; }
			
			/* Empty / loading states */
			.state-row td {
				text-align: center;
				padding: 60px 20px;
				color: var(--muted);
				font-size: 0.8rem;
				letter-spacing: 0.05em;
			}
			
			.spinner {
				display: inline-block;
				width: 16px;
				height: 16px;
				border: 2px solid var(--border);
				border-top-color: var(--accent);
				border-radius: 50%;
				animation: spin 0.7s linear infinite;
				margin-right: 10px;
				vertical-align: middle;
			}
			
			@keyframes spin { to { transform: rotate(360deg); } }
			
			/* Footer */
			footer {
				margin: 48px 0 32px;
				border-top: 1px solid var(--border);
				padding-top: 24px;
				display: flex;
				justify-content: space-between;
				align-items: center;
				flex-wrap: wrap;
				gap: 12px;
			}
			
			footer span {
				font-size: 0.65rem;
				color: var(--muted);
				letter-spacing: 0.1em;
				text-transform: uppercase;
			}
			
			footer a {
				color: var(--muted);
				text-decoration: none;
				transition: color 0.2s;
			}
			
			footer a:hover { color: var(--accent); }
			
			/* Responsive */
			@media (max-width: 600px) {
				.accuracy-cell { display: none; }
				td, th { padding: 12px 14px; }
			}
		</style>
	</head>
	<body>

		<div class="container">
			<header>
				<div class="header-inner">
					<div class="logo-area">
						<h1>Leader<span>board</span></h1>
						<p>Pull Request Accuracy Rankings</p>
					</div>
					<div class="live-badge">
						<span class="live-dot"></span>
						Auto-updated on PR
					</div>
				</div>
			</header>

			<div class="stats-bar" id="stats-bar">
				<div class="stat-cell">
					<div class="label">Submissions</div>
					<div class="value" id="stat-count">—</div>
				</div>
				<div class="stat-cell">
					<div class="label">Best Accuracy</div>
					<div class="value" id="stat-best">—</div>
				</div>
				<div class="stat-cell">
					<div class="label">Latest Accuracy</div>
					<div class="value" id="stat-latest">—</div>
				</div>
			</div>

			<div class="controls">
				<span class="section-label">All Submissions — Sorted by Accuracy</span>
				<button class="refresh-btn" onclick="loadLeaderboard()">↻ Refresh</button>
			</div>

			<div class="table-wrap">
				<table>
					<thead>
						<tr>
							<th class="rank">#</th>
							<th>Commit</th>
							<th class="accuracy-cell">Accuracy</th>
							<th>Score</th>
							<th>Timestamp</th>
						</tr>
					</thead>
					<tbody id="table-body">
						<tr class="state-row">
							<td colspan="5"><span class="spinner"></span>Loading leaderboard…</td>
						</tr>
					</tbody>
				</table>
			</div>

			<footer>
				<span>Updated automatically via GitHub Actions</span>
				<span>Source: <a href="leaderboard.csv">leaderboard.csv</a></span>
			</footer>
		</div>

		<script>
			async function loadLeaderboard() {
				const tbody = document.getElementById('table-body');
				tbody.innerHTML = '<tr class="state-row"><td colspan="5"><span class="spinner"></span>Loading…</td></tr>';
				
				try {
					const res = await fetch('leaderboard.csv?nocache=' + Date.now());
					if (!res.ok) throw new Error('CSV not found');
					const text = await res.text();
					const rows = parseCSV(text);
					
					if (!rows.length) {
						tbody.innerHTML = '<tr class="state-row"><td colspan="5">No submissions yet.</td></tr>';
						return;
					}
					
					// Stats
					const best = rows[0].accuracy;
					const latest = [...rows].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))[0].accuracy;
					document.getElementById('stat-count').textContent = rows.length;
					document.getElementById('stat-best').textContent = (best * 100).toFixed(2) + '%';
					document.getElementById('stat-latest').textContent = (latest * 100).toFixed(2) + '%';
					
					// Render rows
					tbody.innerHTML = rows.map((row, i) => {
						const rank = i + 1;
						const pct = (row.accuracy * 100).toFixed(2);
						const barW = (row.accuracy * 100).toFixed(1);
						const rankClass = rank <= 3 ? `rank-${rank}` : '';
						const delay = i * 0.05;
						return `
						<tr class="${rankClass}" style="animation-delay:${delay}s">
						<td class="rank"><span class="rank-num">${rank <= 3 ? ['🥇','🥈','🥉'][rank-1] : rank}</span></td>
						<td><span class="commit">${escHtml(row.commit_hash)}</span></td>
						<td class="accuracy-cell">
						<div class="accuracy-wrap">
						<span class="accuracy-val">${pct}%</span>
						<div class="bar-track">
						<div class="bar-fill" style="width:${barW}%;animation-delay:${delay + 0.1}s"></div>
						</div>
						</div>
						</td>
						<td><span class="accuracy-val">${pct}%</span></td>
						<td class="ts">${escHtml(row.timestamp)}</td>
						</tr>`;
						}).join('');
						
						} catch (e) {
							tbody.innerHTML = `<tr class="state-row"><td colspan="5">Could not load leaderboard.csv — make sure it exists in the repo root.<br><small style="color:#444;margin-top:6px;display:block">${e.message}</small></td></tr>`;
						}
					}
					
					function parseCSV(text) {
						const lines = text.trim().split('\n').filter(Boolean);
						if (lines.length < 2) return [];
						const headers = lines[0].split(',').map(h => h.trim());
						return lines.slice(1).map(line => {
							const vals = line.split(',').map(v => v.trim());
							const obj = {};
							headers.forEach((h, i) => obj[h] = vals[i] ?? '');
							obj.accuracy = parseFloat(obj.accuracy) || 0;
							return obj;
							}).sort((a, b) => b.accuracy - a.accuracy);
						}
						
						function escHtml(s) {
							return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
						}
						
						loadLeaderboard();
		</script>
	</body>
</html>
