<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Leaderboard</title>

<style>
body {
    background: #0a0a0a;
    color: #f0f0f0;
    font-family: monospace;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h1 {
    margin-bottom: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #222;
    text-align: left;
}

th {
    color: #888;
    text-transform: uppercase;
    font-size: 12px;
}

.rank-1 { color: gold; }
.rank-2 { color: silver; }
.rank-3 { color: #cd7f32; }

.commit {
    color: #e8ff47;
}

button {
    margin-bottom: 15px;
    padding: 6px 12px;
    background: none;
    border: 1px solid #333;
    color: #aaa;
    cursor: pointer;
}

button:hover {
    border-color: #e8ff47;
    color: #e8ff47;
}
</style>
</head>

<body>

<div class="container">
<h1>Leaderboard</h1>

<button onclick="loadLeaderboard()">↻ Refresh</button>

<table>
<thead>
<tr>
<th>#</th>
<th>User</th>
<th>Commit</th>
<th>Accuracy</th>
<th>Timestamp</th>
</tr>
</thead>

<tbody id="table-body">
<tr><td colspan="5">Loading...</td></tr>
</tbody>
</table>
</div>

<script>
async function loadLeaderboard() {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';

    try {
        const res = await fetch('leaderboard.csv?nocache=' + Date.now());
        if (!res.ok) throw new Error("CSV not found");

        const text = await res.text();
        const rows = parseCSV(text);

        if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="5">No submissions yet</td></tr>';
            return;
        }

        tbody.innerHTML = rows.map((row, i) => {
            const rank = i + 1;
            const pct = (row.accuracy * 100).toFixed(2);

            return `
            <tr class="rank-${rank}">
                <td>${rank}</td>
                <td>${row.username || 'unknown'}</td>
                <td class="commit">${row.commit_hash}</td>
                <td>${pct}%</td>
                <td>${row.timestamp}</td>
            </tr>
            `;
        }).join('');

    } catch (err) {
        tbody.innerHTML = `<tr><td colspan="5">Error loading leaderboard</td></tr>`;
    }
}

function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',');

    return lines.slice(1).map(line => {
        const vals = line.split(',');
        let obj = {};
        headers.forEach((h, i) => obj[h] = vals[i]);
        obj.accuracy = parseFloat(obj.accuracy) || 0;
        return obj;
    }).sort((a, b) => b.accuracy - a.accuracy);
}

loadLeaderboard();
</script>

</body>
</html>
